# Brand palette: navy (primary) + teal (accent) on a light background.
[theme]
base = "light"
primaryColor = "#0F8B8D"             # teal — buttons, links, accents
backgroundColor = "#F6F8FB"          # light page background (not pure white)
secondaryBackgroundColor = "#FFFFFF" # cards, panels, inputs
textColor = "#1B2540"                # body copy
font = "sans serif"
